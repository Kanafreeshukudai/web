<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>和室 — Uy so'zlari</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap');

:root{
  --bg:#161f29;
  --bg-soft:#1c2733;
  --panel:#20303d;
  --panel-2:#25384a;
  --border:#3a5164;
  --gold:#cda355;
  --gold-soft:rgba(205,163,85,0.14);
  --cream:#f1ead9;
  --muted:#8ea3b3;
  --green:#5f9b5b;
  --green-soft:rgba(95,155,91,0.18);
  --red:#c2534a;
  --red-soft:rgba(194,83,74,0.18);
  --font-display:'Shippori Mincho', serif;
  --font-body:'Zen Kaku Gothic New', sans-serif;
}

*{box-sizing:border-box;}

body{
  margin:0;
  background:
    radial-gradient(circle at 15% 8%, rgba(205,163,85,0.06), transparent 40%),
    repeating-linear-gradient(0deg, transparent 0 78px, rgba(255,255,255,0.02) 78px 79px),
    repeating-linear-gradient(90deg, transparent 0 78px, rgba(255,255,255,0.02) 78px 79px),
    var(--bg);
  color:var(--cream);
  font-family:var(--font-body);
  min-height:100vh;
  padding:28px 16px 60px;
}

.wrap{max-width:920px; margin:0 auto; position:relative; z-index:1;}

/* ---------- BACKGROUND FALL EFFECT (nuqta/chiziq sekin tushishi) ---------- */
.bg-fx{
  position:fixed;
  inset:0;
  z-index:0;
  overflow:hidden;
  pointer-events:none;
}
.bg-fx::before,
.bg-fx::after{
  content:'';
  position:absolute;
  left:0; right:0;
  top:-240px; bottom:-240px;
  background-repeat:repeat;
  will-change:background-position;
}
/* siyrak oltin/krem nuqtalar */
.bg-fx::before{
  background-image:
    radial-gradient(1.6px 1.6px at 8% 0, rgba(205,163,85,0.55), transparent 60%),
    radial-gradient(1.2px 1.2px at 23% 0, rgba(241,234,217,0.35), transparent 60%),
    radial-gradient(1.8px 1.8px at 41% 0, rgba(205,163,85,0.4), transparent 60%),
    radial-gradient(1.2px 1.2px at 58% 0, rgba(241,234,217,0.3), transparent 60%),
    radial-gradient(1.6px 1.6px at 74% 0, rgba(205,163,85,0.45), transparent 60%),
    radial-gradient(1.2px 1.2px at 89% 0, rgba(241,234,217,0.28), transparent 60%);
  background-size:100% 260px;
  animation:bgFall 16s linear infinite;
  opacity:.8;
}
/* siyrak yupqa chiziqlar (parallax uchun sekinroq va boshqa fazada) */
.bg-fx::after{
  background-image:
    linear-gradient(180deg, transparent 0%, rgba(205,163,85,0.28) 40%, transparent 55%),
    linear-gradient(180deg, transparent 0%, rgba(241,234,217,0.16) 35%, transparent 50%);
  background-position:14% 0, 67% 0;
  background-size:1px 130px, 1px 170px;
  animation:bgFall 26s linear infinite;
  opacity:.55;
}
@keyframes bgFall{
  from{ background-position-y:-260px; }
  to{ background-position-y:0; }
}
@media (prefers-reduced-motion: reduce){
  .bg-fx::before,.bg-fx::after{ animation:none; }
}

/* ---------- HEADER ---------- */
header{text-align:center; margin-bottom:26px;}
.eyebrow{
  font-size:12px; letter-spacing:.22em; color:var(--gold);
  text-transform:uppercase; margin-bottom:8px; font-weight:700;
}
h1{
  font-family:var(--font-display);
  font-size:clamp(28px,5vw,42px);
  margin:0 0 6px;
  color:var(--cream);
  font-weight:700;
}
h1 span{color:var(--gold);}
.subtitle{color:var(--muted); font-size:14.5px; margin:0;}

/* ---------- TABS (shoji slider) ---------- */
.tabs{
  position:relative;
  display:flex;
  width:min(360px,100%);
  margin:22px auto 0;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:999px;
  padding:4px;
}
.tabs .indicator{
  position:absolute; top:4px; left:4px;
  width:calc(50% - 4px); height:calc(100% - 8px);
  background:linear-gradient(135deg,var(--gold),#a9823f);
  border-radius:999px;
  transition:transform .32s cubic-bezier(.65,.05,.36,1);
}
.tabs.quiz-active .indicator{transform:translateX(100%);}
.tab-btn{
  position:relative; z-index:1; flex:1;
  border:none; background:transparent; cursor:pointer;
  padding:10px 14px; font-family:var(--font-body); font-weight:700;
  font-size:14px; color:var(--muted); transition:color .25s;
  border-radius:999px;
}
.tab-btn.active{color:#1a1208;}

section.view{display:none; animation:fadein .35s ease;}
section.view.active{display:block;}
@keyframes fadein{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

/* ---------- SUBNAV (Hammasi / Kunlik vazifa) ---------- */
.subnav{
  display:flex; justify-content:center; gap:10px; margin-top:22px; flex-wrap:wrap;
}
.sub-btn{
  border:1px solid var(--border); background:var(--panel); color:var(--muted);
  padding:8px 18px; border-radius:999px; font-family:var(--font-body); font-weight:700;
  font-size:13px; cursor:pointer; transition:all .2s;
}
.sub-btn.active{background:var(--gold-soft); color:var(--gold); border-color:var(--gold);}
.sub-btn .dot{display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--gold); margin-left:6px; vertical-align:middle;}

/* ---------- FLASHCARDS ---------- */
.grid{
  margin-top:28px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:14px;
}
.card{
  perspective:1000px;
  height:150px;
  cursor:pointer;
}
.card-inner{
  position:relative; width:100%; height:100%;
  transition:transform .55s cubic-bezier(.3,.1,.2,1);
  transform-style:preserve-3d;
}
.card.flipped .card-inner{transform:rotateY(180deg);}
.face{
  position:absolute; inset:0;
  border-radius:14px;
  backface-visibility:hidden;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:14px; text-align:center;
  border:1px solid var(--border);
}
.face.front{
  background:linear-gradient(160deg,var(--panel-2),var(--panel));
}
.face.front::before{
  content:'';
  position:absolute; top:10px; left:50%; transform:translateX(-50%);
  width:20px; height:6px; border-radius:3px;
  background:var(--gold); opacity:.55;
}
.tag{
  font-size:9.5px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--gold); font-weight:700; margin-bottom:10px;
}
.uz-word{font-size:17px; font-weight:700; color:var(--cream); line-height:1.25;}
.face.back{
  background:
    repeating-linear-gradient(0deg, transparent 0 17px, rgba(241,234,217,0.05) 17px 18px),
    repeating-linear-gradient(90deg, transparent 0 17px, rgba(241,234,217,0.05) 17px 18px),
    linear-gradient(160deg,#1a2530,#16202a);
  transform:rotateY(180deg);
}
.kana{font-family:var(--font-display); font-size:24px; font-weight:700; color:var(--gold);}
.romaji{font-size:12px; color:var(--muted); margin-top:6px; font-style:italic;}
.hint{font-size:11px; color:var(--muted); margin-top:10px;}

/* ---------- QUIZ ---------- */
.progress-row{display:flex; gap:5px; justify-content:center; margin:24px 0 8px; flex-wrap:wrap;}
.mat{width:16px; height:16px; border-radius:3px; background:var(--panel-2); border:1px solid var(--border); transition:background .25s,border-color .25s;}
.mat.done-correct{background:var(--green); border-color:var(--green);}
.mat.done-wrong{background:var(--red); border-color:var(--red);}
.mat.current{border-color:var(--gold);}
.score-line{text-align:center; color:var(--muted); font-size:13px; margin-bottom:18px;}

.quiz-stage{display:flex; justify-content:center;}
.quiz-card{
  width:min(480px,100%);
  background:linear-gradient(160deg,var(--panel-2),var(--panel));
  border:1px solid var(--border);
  border-radius:20px;
  padding:30px 26px 26px;
  position:relative;
  transition:transform .4s ease, opacity .4s ease, border-color .3s, box-shadow .3s;
}
.quiz-card.flash-correct{border-color:var(--green); box-shadow:0 0 0 3px var(--green-soft);}
.quiz-card.flash-wrong{border-color:var(--red); box-shadow:0 0 0 3px var(--red-soft);}
.quiz-card.leaving{opacity:0; transform:scale(.92) translateY(-6px);}

.q-tag{font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); font-weight:700; text-align:center;}
.q-word{font-family:var(--font-display); font-size:26px; font-weight:700; text-align:center; margin:8px 0 22px; color:var(--cream);}

.answer-strip{
  min-height:56px;
  background:#12191f;
  border:1px dashed var(--border);
  border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display);
  font-size:24px; letter-spacing:.06em; color:var(--gold);
  padding:8px 12px; margin-bottom:16px; word-break:break-all;
}
.answer-strip.placeholder{color:var(--muted); font-family:var(--font-body); font-size:13px; letter-spacing:0;}

.reveal-answer{text-align:center; font-size:13px; color:var(--muted); min-height:18px; margin-bottom:10px;}
.reveal-answer b{color:var(--gold); font-family:var(--font-display); font-size:15px;}

.kb-toggle{display:flex; justify-content:center; gap:8px; margin-bottom:12px;}
.kb-toggle button{
  border:1px solid var(--border); background:var(--bg-soft); color:var(--muted);
  padding:6px 16px; border-radius:999px; font-family:var(--font-body); font-weight:700;
  font-size:12.5px; cursor:pointer; transition:all .2s;
}
.kb-toggle button.active{background:var(--gold-soft); color:var(--gold); border-color:var(--gold);}

.kb-grid{
  display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-bottom:14px;
}
.kb-grid button{
  border:1px solid var(--border); background:var(--bg-soft); color:var(--cream);
  border-radius:8px; padding:9px 0; font-family:var(--font-display); font-size:16px;
  cursor:pointer; transition:background .15s, transform .1s;
}
.kb-grid button:hover{background:var(--panel-2);}
.kb-grid button:active{transform:scale(.9);}

.action-row{display:flex; gap:8px;}
.action-row button{
  flex:1; padding:11px 0; border-radius:10px; border:1px solid var(--border);
  font-family:var(--font-body); font-weight:700; font-size:13.5px; cursor:pointer;
  background:var(--bg-soft); color:var(--cream); transition:all .18s;
}
.action-row .submit-btn{background:linear-gradient(135deg,var(--gold),#a9823f); color:#1a1208; border:none;}
.action-row button:disabled{opacity:.45; cursor:not-allowed;}

.stamp{
  position:absolute; top:-14px; right:-14px; width:66px; height:66px;
  border:3px solid var(--red); border-radius:50%; color:var(--red);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-weight:700; font-size:12px;
  transform:rotate(-18deg) scale(0); opacity:0;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1), opacity .25s;
  background:rgba(194,83,74,0.06); text-align:center; line-height:1.1; letter-spacing:.05em;
}
.stamp.show{transform:rotate(-18deg) scale(1); opacity:1;}
.stamp.ok{border-color:var(--green); color:var(--green); background:rgba(95,155,91,0.06);}

/* ---------- DONE SCREEN ---------- */
.done-card{
  width:min(480px,100%); margin:0 auto;
  background:linear-gradient(160deg,var(--panel-2),var(--panel));
  border:1px solid var(--border); border-radius:20px; padding:32px 26px; text-align:center;
}
.done-card h2{font-family:var(--font-display); margin:0 0 6px; color:var(--gold); font-size:24px;}
.done-stats{display:flex; justify-content:center; gap:26px; margin:18px 0 22px;}
.done-stats div{text-align:center;}
.done-stats .num{font-size:26px; font-weight:900; display:block;}
.done-stats .num.g{color:var(--green);}
.done-stats .num.r{color:var(--red);}
.done-stats .lbl{font-size:11px; color:var(--muted); letter-spacing:.08em; text-transform:uppercase;}
.mistake-list{text-align:left; margin:0 0 20px; padding:0; list-style:none; max-height:220px; overflow:auto;}
.mistake-list li{
  display:flex; justify-content:space-between; padding:8px 4px; border-bottom:1px solid var(--border);
  font-size:13.5px;
}
.mistake-list b{color:var(--gold); font-family:var(--font-display);}

footer.note{text-align:center; color:var(--muted); font-size:12px; margin-top:36px;}
@media(max-width:420px){.kb-grid{grid-template-columns:repeat(5,1fr);}}
</style>
</head>
<body>
<div class="bg-fx"></div>
<div class="wrap">

  <header>
    <div class="eyebrow">和室 &middot; JAPANESE HOME VOCAB</div>
    <h1>Uy <span>so'zlari</span></h1>
    <p class="subtitle">Yapon uy-ro'zg'or so'zlari &mdash; kartochka bilan yodlang, viktorina bilan tekshiring</p>

    <div class="tabs" id="tabs">
      <div class="indicator"></div>
      <button class="tab-btn active" id="tabFlash">Flashcard</button>
      <button class="tab-btn" id="tabQuiz">Viktorina</button>
    </div>
  </header>

  <section class="view active" id="viewFlash">
    <div class="subnav" id="flashSubnav">
      <button class="sub-btn active" data-set="all" id="flashSubAll">Hammasi</button>
      <button class="sub-btn" data-set="daily" id="flashSubDaily">Kunlik vazifa</button>
    </div>
    <div class="grid" id="flashGrid"></div>
  </section>

  <section class="view" id="viewQuiz">
    <div class="subnav" id="quizSubnav">
      <button class="sub-btn active" data-set="all" id="quizSubAll">Hammasi</button>
      <button class="sub-btn" data-set="daily" id="quizSubDaily">Kunlik vazifa</button>
    </div>
    <div class="progress-row" id="progressRow"></div>
    <div class="score-line" id="scoreLine"></div>

    <div class="quiz-stage" id="quizStage"></div>
    <div id="doneStage" style="display:none;"></div>
  </section>

  <footer class="note">Kartani bosib ochib-yoping &middot; Viktorinada javobni faqat kana tugmalari orqali yozing</footer>
</div>

<script>
/* ============================================================
   SO'ZLAR RO'YXATI — yangi so'z qo'shish shu yerda, oddiy usulda.
   Har bir so'z uchun quyidagi shaklda bitta qator qo'shing:

   {uz:"O'zbekcha ma'no", kana:"ko'rinadigan yozuv", accepted:["to'g'ri javob(lar)"], romaji:"talaffuz", group:"Guruh nomi", kb:"hira" yoki "kata"},

   - accepted: viktorinada shu yozuvlardan biri to'g'ri deb hisoblanadi (bir nechta variant bo'lsa vergul bilan)
   - kb: so'z hiragana bilan yozilsa "hira", katakana bilan yozilsa "kata"
   - group: kartochkada chiqadigan kichik yorliq (masalan "Oshxona", "Kiyim" va h.k.) — istagan nom bo'lishi mumkin
   Klaviatura tugmalari pastda AVTOMATIK hisoblanadi, qo'lda sozlash shart emas.
   ============================================================ */
/* "Hammasi" bo'limi — asosiy so'zlar to'plami */
const ALL_WORDS = [
  {uz:"Uy", kana:"うち / いえ", accepted:["うち","いえ"], romaji:"uchi / ie", group:"Bino", kb:"hira"},
  {uz:"Xona", kana:"へや", accepted:["へや"], romaji:"heya", group:"Bino", kb:"hira"},
  {uz:"Eshik", kana:"ドア", accepted:["ドア"], romaji:"doa", group:"Bino", kb:"kata"},
  {uz:"Deraza", kana:"まど", accepted:["まど"], romaji:"mado", group:"Bino", kb:"hira"},
  {uz:"Karavot", kana:"ベッド", accepted:["ベッド"], romaji:"beddo", group:"Mebel", kb:"kata"},
  {uz:"Stol", kana:"つくえ", accepted:["つくえ"], romaji:"tsukue", group:"Mebel", kb:"hira"},
  {uz:"Stul", kana:"いす", accepted:["いす"], romaji:"isu", group:"Mebel", kb:"hira"},
  {uz:"Elektr / Chiroq", kana:"でんき", accepted:["でんき"], romaji:"denki", group:"Texnika", kb:"hira"},
  {uz:"Konditsioner", kana:"エアコン", accepted:["エアコン"], romaji:"eakon", group:"Texnika", kb:"kata"},
  {uz:"Soat", kana:"とけい", accepted:["とけい"], romaji:"tokei", group:"Texnika", kb:"hira"},
  {uz:"Televizor", kana:"テレビ", accepted:["テレビ"], romaji:"terebi", group:"Texnika", kb:"kata"},
  {uz:"Parda", kana:"カーテン", accepted:["カーテン"], romaji:"kāten", group:"Boshqa", kb:"kata"},
  {uz:"Axlat qutisi", kana:"ごみばこ", accepted:["ごみばこ"], romaji:"gomibako", group:"Boshqa", kb:"hira"},
  {uz:"Hojatxona", kana:"トイレ", accepted:["トイレ"], romaji:"toire", group:"Boshqa", kb:"kata"}
];

/* "Kunlik vazifa" bo'limi — har kuni shu yerga yangi so'z qo'shing.
   Format ALL_WORDS bilan bir xil: {uz, kana, accepted:[...], romaji, group, kb:"hira"/"kata"}
   Eslatma: agar so'z kanji bilan yozilsa (masalan 電子レンジ), "kana" maydonida
   asl (kanji bilan) shaklini ko'rsating, "accepted" maydonida esa faqat
   hiragana/katakana bilan terish mumkin bo'lgan o'qilishini yozing. */
const DAILY_WORDS = [
  {uz:"Dush", kana:"シャワー", accepted:["シャワー"], romaji:"shawā", group:"Boshqa", kb:"kata"},
  {uz:"Stakan", kana:"コップ", accepted:["コップ"], romaji:"koppu", group:"Oshxona", kb:"kata"},
  {uz:"Likopcha", kana:"おさら", accepted:["おさら"], romaji:"osara", group:"Oshxona", kb:"hira"},
  {uz:"Ovqat yeyish cho'plari", kana:"はし", accepted:["はし"], romaji:"hashi", group:"Oshxona", kb:"hira"},
  {uz:"Qoshiq", kana:"スプーン", accepted:["スプーン"], romaji:"supūn", group:"Oshxona", kb:"kata"},
  {uz:"Vilka", kana:"フォーク", accepted:["フォーク"], romaji:"fōku", group:"Oshxona", kb:"kata"},
  {uz:"Muzlatgich", kana:"れいぞうこ", accepted:["れいぞうこ"], romaji:"reizōko", group:"Oshxona", kb:"hira"},
  {uz:"Mikroto'lqinli pech", kana:"電子レンジ", accepted:["でんしレンジ"], romaji:"denshi renji", group:"Oshxona", kb:"hira"},
  {uz:"Qozon", kana:"なべ", accepted:["なべ"], romaji:"nabe", group:"Oshxona", kb:"hira"},
  {uz:"Tovada", kana:"フライパン", accepted:["フライパン"], romaji:"furaipan", group:"Oshxona", kb:"kata"},
  {uz:"Oshxona pichog'i", kana:"ほうちょう", accepted:["ほうちょう"], romaji:"hōchō", group:"Oshxona", kb:"hira"}

  /* --- MISOL: ertaga qo'shadigan yangi so'zingizni shu formatda pastiga yozing ---
  ,{uz:"Choynak", kana:"やかん", accepted:["やかん"], romaji:"yakan", group:"Oshxona", kb:"hira"}
  */
];

/* Klaviatura tugmalari ikkala ro'yxatdagi accepted javoblardan avtomatik
   yig'iladi, gojuon (an'anaviy yapon) tartibida ko'rsatiladi. Yangi so'z
   qo'shsangiz, kerakli harf tugmalar orasida o'zi paydo bo'ladi. */
const HIRA_REF = "あいうえおかきくけこがぎぐげごさしすせそざじずぜぞたちつてとだぢづでどなにぬねのはひふへほばびぶべぼぱぴぷぺぽまみむめもやゆよらりるれろわをんゃゅょっぁぃぅぇぉ".split("");
const KATA_REF = "アイウエオカキクケコガギグゲゴサシスセソザジズゼゾタチツテトダヂヅデドナニヌネノハヒフヘホバビブベボパピプペポマミムメモヤユヨラリルレロワヲンャュョッァィゥェォー".split("");

function collectUsedChars(){
  const used = new Set();
  [...ALL_WORDS, ...DAILY_WORDS].forEach(w=>{
    w.accepted.forEach(ans=>{
      ans.split("").forEach(ch=>used.add(ch));
    });
  });
  return used;
}
const USED_CHARS = collectUsedChars();
const HIRA_KEYS = HIRA_REF.filter(ch=>USED_CHARS.has(ch));
const KATA_KEYS = KATA_REF.filter(ch=>USED_CHARS.has(ch));

/* ---------------- TABS ---------------- */
const tabs = document.getElementById('tabs');
const tabFlash = document.getElementById('tabFlash');
const tabQuiz = document.getElementById('tabQuiz');
const viewFlash = document.getElementById('viewFlash');
const viewQuiz = document.getElementById('viewQuiz');

tabFlash.addEventListener('click', ()=>{
  tabs.classList.remove('quiz-active');
  tabFlash.classList.add('active'); tabQuiz.classList.remove('active');
  viewFlash.classList.add('active'); viewQuiz.classList.remove('active');
});
tabQuiz.addEventListener('click', ()=>{
  tabs.classList.add('quiz-active');
  tabQuiz.classList.add('active'); tabFlash.classList.remove('active');
  viewQuiz.classList.add('active'); viewFlash.classList.remove('active');
  if(!quizStarted) startQuiz(ALL_WORDS);
});

/* ---------------- FLASHCARDS ---------------- */
const flashGrid = document.getElementById('flashGrid');
const flashSubAll = document.getElementById('flashSubAll');
const flashSubDaily = document.getElementById('flashSubDaily');

function renderFlashGrid(words){
  flashGrid.innerHTML = '';
  words.forEach(w=>{
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-inner">
        <div class="face front">
          <div class="tag">${w.group}</div>
          <div class="uz-word">${w.uz}</div>
        </div>
        <div class="face back">
          <div class="kana">${w.kana}</div>
          <div class="romaji">${w.romaji}</div>
          <div class="hint">${w.uz}</div>
        </div>
      </div>`;
    card.addEventListener('click', ()=>card.classList.toggle('flipped'));
    flashGrid.appendChild(card);
  });
}

flashSubAll.addEventListener('click', ()=>{
  flashSubAll.classList.add('active'); flashSubDaily.classList.remove('active');
  renderFlashGrid(ALL_WORDS);
});
flashSubDaily.addEventListener('click', ()=>{
  flashSubDaily.classList.add('active'); flashSubAll.classList.remove('active');
  renderFlashGrid(DAILY_WORDS);
});

renderFlashGrid(ALL_WORDS);

/* ---------------- QUIZ ---------------- */
let quizStarted = false;
let queue = [];
let idx = 0;
let correctCount = 0;
let wrongCount = 0;
let mistakes = [];
let typed = "";
let kbMode = "hira";
let busy = false;
let resultLog = []; // per-question 'correct'/'wrong' for progress dots
let currentQuizWords = ALL_WORDS; // eslab qolinadi — "qaytadan boshlash" shu to'plamga qaytadi

const progressRow = document.getElementById('progressRow');
const scoreLine = document.getElementById('scoreLine');
const quizStage = document.getElementById('quizStage');
const doneStage = document.getElementById('doneStage');
const quizSubAll = document.getElementById('quizSubAll');
const quizSubDaily = document.getElementById('quizSubDaily');

quizSubAll.addEventListener('click', ()=>{
  quizSubAll.classList.add('active'); quizSubDaily.classList.remove('active');
  startQuiz(ALL_WORDS);
});
quizSubDaily.addEventListener('click', ()=>{
  quizSubDaily.classList.add('active'); quizSubAll.classList.remove('active');
  startQuiz(DAILY_WORDS);
});

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function startQuiz(sourceWords){
  quizStarted = true;
  currentQuizWords = sourceWords;
  queue = shuffle(sourceWords);
  idx = 0; correctCount = 0; wrongCount = 0; mistakes = []; resultLog = [];
  quizStage.style.display = 'flex';
  doneStage.style.display = 'none';
  renderProgress();
  renderScore();
  renderQuestion();
}

function renderProgress(){
  progressRow.innerHTML = '';
  queue.forEach((_,i)=>{
    const d = document.createElement('div');
    d.className = 'mat';
    if(resultLog[i]==='correct') d.classList.add('done-correct');
    else if(resultLog[i]==='wrong') d.classList.add('done-wrong');
    else if(i===idx) d.classList.add('current');
    progressRow.appendChild(d);
  });
}

function renderScore(){
  scoreLine.textContent = `${idx}/${queue.length} savol · ✓ ${correctCount}  ✕ ${wrongCount}`;
}

function renderQuestion(){
  if(idx >= queue.length){ showDone(); return; }
  const w = queue[idx];
  typed = "";
  kbMode = w.kb;
  busy = false;

  quizStage.innerHTML = `
    <div class="quiz-card" id="qCard">
      <div class="stamp" id="stamp"></div>
      <div class="q-tag">${w.group}</div>
      <div class="q-word">${w.uz}</div>
      <div class="answer-strip placeholder" id="answerStrip">kana tugmalarini bosing&hellip;</div>
      <div class="reveal-answer" id="revealAnswer"></div>
      <div class="kb-toggle">
        <button data-mode="hira" id="btnHira">ひらがな</button>
        <button data-mode="kata" id="btnKata">カタカナ</button>
      </div>
      <div class="kb-grid" id="kbGrid"></div>
      <div class="action-row">
        <button id="btnBack">⌫</button>
        <button id="btnClear">Tozalash</button>
        <button class="submit-btn" id="btnSubmit">Tekshirish</button>
      </div>
    </div>`;

  document.getElementById('btnHira').addEventListener('click', ()=>setKbMode('hira'));
  document.getElementById('btnKata').addEventListener('click', ()=>setKbMode('kata'));
  document.getElementById('btnBack').addEventListener('click', ()=>{ typed = typed.slice(0,-1); renderStrip(); });
  document.getElementById('btnClear').addEventListener('click', ()=>{ typed = ""; renderStrip(); });
  document.getElementById('btnSubmit').addEventListener('click', submitAnswer);

  setKbMode(kbMode);
  renderStrip();
  renderProgress();
  renderScore();
}

function setKbMode(mode){
  kbMode = mode;
  document.getElementById('btnHira').classList.toggle('active', mode==='hira');
  document.getElementById('btnKata').classList.toggle('active', mode==='kata');
  const grid = document.getElementById('kbGrid');
  grid.innerHTML = '';
  const keys = mode==='hira' ? HIRA_KEYS : KATA_KEYS;
  keys.forEach(k=>{
    const b = document.createElement('button');
    b.textContent = k;
    b.addEventListener('click', ()=>{ if(!busy){ typed += k; renderStrip(); }});
    grid.appendChild(b);
  });
}

function renderStrip(){
  const strip = document.getElementById('answerStrip');
  if(!strip) return;
  if(typed.length===0){
    strip.textContent = 'kana tugmalarini bosing…';
    strip.classList.add('placeholder');
  } else {
    strip.textContent = typed;
    strip.classList.remove('placeholder');
  }
}

function submitAnswer(){
  if(busy) return;
  const w = queue[idx];
  if(typed.length===0) return;
  busy = true;
  const isCorrect = w.accepted.includes(typed);
  const card = document.getElementById('qCard');
  const stamp = document.getElementById('stamp');
  const reveal = document.getElementById('revealAnswer');

  if(isCorrect){
    correctCount++;
    resultLog[idx] = 'correct';
    card.classList.add('flash-correct');
    stamp.classList.add('ok');
    stamp.textContent = '合格';
    stamp.classList.add('show');
  } else {
    wrongCount++;
    mistakes.push(w);
    resultLog[idx] = 'wrong';
    card.classList.add('flash-wrong');
    stamp.textContent = '✕';
    stamp.classList.add('show');
    reveal.innerHTML = `To'g'ri javob: <b>${w.kana}</b>`;
  }
  renderProgress();
  renderScore();

  const delay = isCorrect ? 900 : 1500;
  setTimeout(()=>{
    card.classList.add('leaving');
    setTimeout(()=>{
      idx++;
      renderQuestion();
    }, 380);
  }, delay);
}

function showDone(){
  quizStage.style.display = 'none';
  doneStage.style.display = 'block';
  const total = queue.length;
  let mistakeHtml = '';
  if(mistakes.length){
    mistakeHtml = `<ul class="mistake-list">${mistakes.map(m=>`<li><span>${m.uz}</span><b>${m.kana}</b></li>`).join('')}</ul>
      <button class="submit-btn" id="btnRetry" style="width:100%;padding:12px;border:none;border-radius:10px;font-weight:700;cursor:pointer;margin-bottom:10px;">Xatolarni qaytarish</button>`;
  }
  doneStage.innerHTML = `
    <div class="done-card">
      <h2>Viktorina tugadi</h2>
      <p style="color:var(--muted);font-size:13px;">Barcha ${total} ta so'z ko'rib chiqildi</p>
      <div class="done-stats">
        <div><span class="num g">${correctCount}</span><span class="lbl">To'g'ri</span></div>
        <div><span class="num r">${wrongCount}</span><span class="lbl">Xato</span></div>
      </div>
      ${mistakeHtml}
      <button id="btnRestart" style="width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--bg-soft);color:var(--cream);font-weight:700;cursor:pointer;">Qaytadan boshlash (${total} ta)</button>
    </div>`;
  document.getElementById('btnRestart').addEventListener('click', ()=>startQuiz(currentQuizWords));
  if(mistakes.length){
    document.getElementById('btnRetry').addEventListener('click', ()=>startQuiz(mistakes));
  }
}
</script>
</body>
</html>
